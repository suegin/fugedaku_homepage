<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふゲだく!-ホームページ</title>
    <link rel="stylesheet" href="assets/css/home.css">
</head>

<body>
    <script src="assets/js/home.js"></script>
    <div id="splash">
        <img src="assets/img/ふゲだくロゴ2.png" alt="Circle Logo" id="splash-logo">

        <div class="fugedaku">
            <img src="assets/img/FUGEDAKU_F.png" class="char" style="--delay: 0s;">
            <img src="assets/img/FUGEDAKU_U.png" class="char" style="--delay: 0.2s;">
            <img src="assets/img/FUGEDAKU_G.png" class="char" style="--delay: 0.4s;">
            <img src="assets/img/FUGEDAKU_E.png" class="char" style="--delay: 0.6s;">
            <img src="assets/img/FUGEDAKU_D.png" class="char" style="--delay: 0.8s;">
            <img src="assets/img/FUGEDAKU_A.png" class="char" style="--delay: 1.0s;">
            <img src="assets/img/FUGEDAKU_K.png" class="char" style="--delay: 1.2s;">
            <img src="assets/img/FUGEDAKU_U.png" class="char" style="--delay: 1.4s;">
            <img src="assets/img/FUGEDAKU_!.png" class="char" style="--delay: 1.6s;">
        </div>
    </div>
    <div id="content">
        <header class="site-header">
            <video class="header-video"  autoplay muted loop>
                <source src="assets/video/20251031_井上.mp4" type="video/mp4">
                お使いのブラウザは動画に対応していません。
            </video>

            <div class="video-overlay"></div>

            <img src="assets/img/ふゲだくロゴ2.png" alt="サークルアイコン" class="circle-icon">
        </header>

        <section class="game-slider">
            <div class="slider-window">
                <div class="slider-track">
                    <a href="games.html?game=1" class="game-card">
                        <img src="assets/img/game1.png" alt="ゲーム1 タイトル画像">
                        <p>GAME TITLE1</p>
                    </a>

                    <a href="games.html?game=2" class="game-card">
                        <img src="assets/img/game2.png" alt="ゲーム2 タイトル画像">
                        <p>GAME TITLE2</p>
                    </a>
                    
                    <a href="games.html?game=3" class="game-card">
                        <img src="assets/img/game3.png" alt="ゲーム3 タイトル画像">
                        <p>GAME TITLE3</p>
                    </a>

                    <a href="games.html?game=4" class="game-card">
                        <img src="assets/img/game4.png" alt="ゲーム4 タイトル画像">
                        <p>GAME TITLE3</p>
                    </a>

                    <a href="games.html?game=5" class="game-card">
                        <img src="assets/img/game5.png" alt="ゲーム5 タイトル画像">
                        <p>GAME TITLE3</p>
                    </a>
                </div>
            </div>
        </section>

        <section class="andMore">
            <a href="games.html" class="andMore-card">
                <img src="assets/img/ANDMORE.png" alt="ゲームページリンク">
            </a>
        </section>

        <section class="table-of-contents">
            <div class="toc-grid">
                <a href="#section-join" class="toc-item">
                    <img src="assets/img/ふゲだく！について_目次.png" alt="ふゲだく！について">
                </a>
                <a href="#section-about" class="toc-item">
                    <img src="assets/img/活動内容_目次.png" alt="活動内容">
                </a>
                <a href="#section-activities" class="toc-item">
                    <img src="assets/img/実績と就職率_目次.png" alt="実績と就職率">
                </a>
                <a href="#section-contact" class="toc-item">
                    <img src="assets/img/入部希望の方へ_目次.png" alt="入部希望の方へ">
                </a>
            </div>
        </section>

        <section id="section-join" class="content-section">
            <img src="assets/img/ふゲだく！について.png" alt="ふゲだく！について" class="section-heading-image">
            <div class="section-content">
                <p>私たちは福岡でゲーム制作を行っているサークルです。</p>
            </div>
        </section>
    </div>
</body>
</html>
